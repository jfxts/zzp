<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虚无笔记 | Void Notes</title>
    <style>
        :root {
            --bg-color: #05070a;
            --text-primary: #e0e6ed;
            --text-secondary: #94a3b8;
            --accent-color: #64ffda;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.05);
            --bg-image: url('https://images.unsplash.com/photo-1478760329108-5c3ed9d495a0?auto=format&fit=crop&w=1920&q=80');
        }

        /* ----- 主题定义 ----- */
        [data-theme="sunny"] {
            --bg-color: #f7f9fc; --text-primary: #2d3436; --text-secondary: #636e72; --accent-color: #ff7675;
            --glass-bg: rgba(0, 0, 0, 0.05); --bg-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1920&q=80');
        }
        [data-theme="rainy"] {
            --bg-color: #1a1e23; --text-primary: #d1d8e0; --text-secondary: #778ca3; --accent-color: #45aaf2;
            --glass-bg: rgba(255, 255, 255, 0.05); --bg-image: url('https://images.unsplash.com/photo-1515694346937-94d85e41e6f0?auto=format&fit=crop&w=1920&q=80');
        }
        [data-theme="doggy"] {
            --bg-color: #fff9f0; --text-primary: #5d4037; --text-secondary: #8d6e63; --accent-color: #ffa726;
            --glass-bg: rgba(93, 64, 55, 0.05); --bg-image: url('https://images.unsplash.com/photo-1516734212186-a967f81ad0d7?auto=format&fit=crop&w=1920&q=80');
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-color) var(--bg-image) no-repeat center center fixed;
            background-size: cover; color: var(--text-primary);
            font-family: 'PingFang SC', sans-serif; transition: 0.5s ease;
        }

        header {
            padding: 1rem 5%; display: flex; align-items: center; justify-content: space-between;
            backdrop-filter: blur(10px); background: rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 100; gap: 10px;
        }

        /* ----- 漫游搜索框 ----- */
        .search-bar {
            flex: 1; max-width: 300px; position: relative;
        }
        .search-bar input {
            width: 100%; background: var(--glass-bg); border: 1px solid var(--glass-border);
            padding: 8px 15px; border-radius: 20px; color: #fff; outline: none; transition: 0.3s;
        }
        .search-bar input:focus { border-color: var(--accent-color); background: rgba(0,0,0,0.4); }

        /* ----- 侧边抽屉增强 ----- */
        .editor-drawer {
            position: fixed; top: 0; right: -100%; width: 450px; height: 100%;
            background: var(--bg-color); backdrop-filter: blur(25px);
            z-index: 1001; transition: 0.5s; padding: 2rem; border-left: 1px solid var(--accent-color);
            overflow-y: auto;
        }
        .editor-drawer.open { right: 0; }

        /* ----- 日历打卡系统 ----- */
        .checkin-section {
            background: var(--glass-bg); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--glass-border); margin-bottom: 2rem;
        }
        .checkin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .checkin-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day-box {
            aspect-ratio: 1; background: rgba(255,255,255,0.05); border-radius: 4px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 10px; cursor: default; border: 1px solid transparent;
        }
        .day-box.active { background: var(--accent-color); color: #000; font-weight: bold; border-color: #fff; }
        .btn-checkin {
            background: var(--accent-color); color: #000; border: none; padding: 8px 15px;
            border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .btn-checkin:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ----- 笔记卡片功能 ----- */
        .note-card {
            background: var(--glass-bg); padding: 2rem; border-radius: 12px; margin-bottom: 2rem;
            border-left: 4px solid var(--accent-color); position: relative; animation: fadeIn 0.5s ease;
        }
        .delete-note {
            position: absolute; top: 20px; right: 20px; color: #ff7675; cursor: pointer;
            opacity: 0.5; transition: 0.3s; font-size: 12px; border: 1px solid #ff7675; padding: 2px 6px; border-radius: 4px;
        }
        .delete-note:hover { opacity: 1; background: rgba(255,118,117,0.1); }

        .tools-nav { position: fixed; bottom: 30px; left: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 999; }
        .tool-btn {
            width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--glass-border);
            background: var(--glass-bg); color: var(--text-primary); backdrop-filter: blur(10px);
            cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: 0.3s;
        }
        .tool-btn:hover { border-color: var(--accent-color); color: var(--accent-color); transform: translateY(-3px); }

        .todo-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .emoji-img { width: 40px; height: 40px; cursor: pointer; border-radius: 4px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 20px; }
    </style>
</head>
<body data-theme="dark">
    <audio id="bgm" loop><source src="bgm.mp3" type="audio/mpeg"></audio>

    <header>
        <a href="index.html" style="color:inherit; text-decoration:none; font-size: 14px;">&larr; 返回</a>
        
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="搜索日期或关键词..." oninput="searchNotes()">
        </div>

        <select onchange="changeTheme(this.value)" style="background:none; color:var(--accent-color); border:1px solid; padding:5px; border-radius:4px; font-size: 12px;">
            <option value="dark">主题: 极夜</option>
            <option value="sunny">主题: 晴空</option>
            <option value="rainy">主题: 听雨</option>
            <option value="doggy">主题: 小狗</option>
        </select>
    </header>

    <div class="container">
        <div id="lucky-card" onclick="drawLucky()" style="background:var(--accent-color); color:#000; padding:1rem; border-radius:10px; text-align:center; font-weight:bold; margin-bottom:2rem; cursor:pointer;">✨ 点击抽取今日鼓励</div>

        <div class="checkin-section">
            <div class="checkin-header">
                <div>
                    <h3 id="current-month" style="font-size: 1rem;">2024.05</h3>
                    <p style="font-size: 12px; opacity: 0.6;">每日打卡，记录存在</p>
                </div>
                <button class="btn-checkin" id="checkin-btn" onclick="handleCheckin()">立即打卡</button>
            </div>
            <div class="checkin-grid" id="checkin-grid">
                </div>
        </div>

        <div id="notes-list"></div>
    </div>

    <div class="tools-nav">
        <button class="tool-btn" onclick="toggleDrawer()" title="记录">🖋️</button>
        <button class="tool-btn" id="music-sync" title="同步音乐">🎵</button>
    </div>

    <div class="editor-drawer" id="editor-drawer">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
            <h2>NEW_FRAGMENT</h2>
            <span onclick="toggleDrawer()" style="cursor:pointer; opacity:0.5;">[关闭]</span>
        </div>
        
        <div style="margin-bottom:1.5rem;">
            <p style="font-size:0.8rem; opacity:0.6; margin-bottom:10px;">TODO_LIST</p>
            <div id="todo-container"></div>
            <button onclick="addTodo()" style="background:none; border:1px dashed var(--accent-color); color:var(--accent-color); width:100%; padding:5px; margin-top:5px; cursor:pointer;">+ 添加规划</button>
        </div>

        <input type="text" id="new-title" placeholder="给这段记忆起个标题..." style="width:100%; padding:12px; margin-bottom:10px; background:rgba(0,0,0,0.2); border:1px solid var(--glass-border); color:#fff; border-radius:5px;">
        
        <p style="font-size:0.8rem; opacity:0.6; margin-bottom:5px;">选择心情表情包：</p>
        <div style="display:flex; gap:10px; margin-bottom:15px; overflow-x:auto;">
            <img src="https://img.icons8.com/emoji/48/000000/dog-face.png" class="emoji-img" onclick="selectEmoji(this.src)">
            <img src="https://img.icons8.com/emoji/48/000000/cat-face.png" class="emoji-img" onclick="selectEmoji(this.src)">
            <img src="https://img.icons8.com/emoji/48/000000/sparkles-emoji.png" class="emoji-img" onclick="selectEmoji(this.src)">
            <button onclick="document.getElementById('emoji-upload').click()" style="width:40px; height:40px; border:1px dashed var(--accent-color); background:none; color:var(--accent-color); cursor:pointer; border-radius:4px;">+</button>
            <input type="file" id="emoji-upload" style="display:none" onchange="uploadEmoji(this)">
        </div>

        <textarea id="new-content" placeholder="在这里写下你的碎碎念..." style="width:100%; height:200px; background:rgba(0,0,0,0.2); border:1px solid var(--glass-border); color:#fff; padding:12px; border-radius:5px; line-height:1.6;"></textarea>
        
        <button onclick="saveNote()" style="width:100%; padding:15px; background:var(--accent-color); border:none; color:#000; font-weight:bold; margin-top:20px; cursor:pointer; border-radius:5px;">存入虚无之中</button>
    </div>

    <script>
        // --- 初始化数据 ---
        let notes = JSON.parse(localStorage.getItem('void_notes') || '[]');
        let checkins = JSON.parse(localStorage.getItem('checkin_data') || '[]');
        let todos = [];
        let selectedEmoji = '';

        // --- 音乐同步 ---
        const audio = document.getElementById('bgm');
        if (sessionStorage.getItem('musicPlaying') === 'true') audio.play();
        document.getElementById('music-sync').onclick = () => {
            if (audio.paused) { audio.play(); sessionStorage.setItem('musicPlaying', 'true'); }
            else { audio.pause(); sessionStorage.setItem('musicPlaying', 'false'); }
        };

        // --- 打卡系统增强版 ---
        function initCheckinGrid() {
            const grid = document.getElementById('checkin-grid');
            const now = new Date();
            document.getElementById('current-month').innerText = `${now.getFullYear()}.${now.getMonth() + 1}`;
            
            grid.innerHTML = '';
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const todayStr = now.toDateString();

            for(let i=1; i<=daysInMonth; i++) {
                const date = new Date(now.getFullYear(), now.getMonth(), i);
                const dateStr = date.toDateString();
                const isChecked = checkins.includes(dateStr);
                
                const box = document.createElement('div');
                box.className = `day-box ${isChecked ? 'active' : ''}`;
                box.innerHTML = `<span>${i}</span>`;
                if(dateStr === todayStr) box.style.borderColor = 'var(--accent-color)';
                grid.appendChild(box);
            }

            if(checkins.includes(todayStr)) {
                document.getElementById('checkin-btn').innerText = '今日已打卡';
                document.getElementById('checkin-btn').disabled = true;
            }
        }

        function handleCheckin() {
            const todayStr = new Date().toDateString();
            if(!checkins.includes(todayStr)) {
                checkins.push(todayStr);
                localStorage.setItem('checkin_data', JSON.stringify(checkins));
                initCheckinGrid();
                alert("打卡成功！又留下了存在的一天。");
            }
        }

        // --- 漫游查找功能 (搜索) ---
        function searchNotes() {
            const keyword = document.getElementById('search-input').value.toLowerCase();
            const filtered = notes.filter(n => 
                n.title.toLowerCase().includes(keyword) || 
                n.content.toLowerCase().includes(keyword) || 
                n.date.includes(keyword)
            );
            renderNotes(filtered);
        }

        // --- 笔记操作 ---
        function saveNote() {
            const title = document.getElementById('new-title').value;
            const content = document.getElementById('new-content').value;
            if(!title || !content) return alert("标题或内容不能为空");

            const newNote = {
                id: Date.now(),
                title,
                content,
                emoji: selectedEmoji,
                date: new Date().toLocaleString(),
                todoSnap: [...todos]
            };
            notes.unshift(newNote);
            localStorage.setItem('void_notes', JSON.stringify(notes));
            
            // 重置编辑器
            document.getElementById('new-title').value = '';
            document.getElementById('new-content').value = '';
            todos = [];
            selectedEmoji = '';
            toggleDrawer();
            renderNotes(notes);
        }

        function deleteNote(id) {
            if(confirm("确定要抹除这段记忆吗？")) {
                notes = notes.filter(n => n.id !== id);
                localStorage.setItem('void_notes', JSON.stringify(notes));
                searchNotes(); // 刷新当前列表（保持搜索状态）
            }
        }

        function renderNotes(data) {
            const list = document.getElementById('notes-list');
            list.innerHTML = data.map(n => `
                <div class="note-card">
                    <span class="delete-note" onclick="deleteNote(${n.id})">删除记忆</span>
                    <p style="font-size:12px; opacity:0.5; margin-bottom:10px;">${n.date}</p>
                    <h2 style="margin-bottom:15px;">${n.title}</h2>
                    <p style="white-space:pre-wrap;">${n.content}</p>
                    ${n.emoji ? `<img src="${n.emoji}" style="max-width:80px; margin-top:15px; border-radius:5px;">` : ''}
                    ${n.todoSnap?.length ? `
                        <div style="margin-top:20px; border-top:1px dashed var(--glass-border); padding-top:15px; font-size:13px;">
                            ${n.todoSnap.map(t => `<div style="opacity:${t.done?0.5:1}"> ${t.done?'[✓]':'[ ]'} ${t.text}</div>`).join('')}
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        // --- 其他功能 ---
        function toggleDrawer() { document.getElementById('editor-drawer').classList.toggle('open'); }
        function changeTheme(t) { document.body.setAttribute('data-theme', t); localStorage.setItem('saved_theme', t); }
        function selectEmoji(s) { selectedEmoji = s; alert("已选择表情"); }
        function uploadEmoji(i) {
            const reader = new FileReader();
            reader.onload = (e) => selectEmoji(e.target.result);
            reader.readAsDataURL(i.files[0]);
        }
        function addTodo() {
            const text = prompt("规划事项:");
            if(text) { todos.push({text, done:false}); renderEditorTodos(); }
        }
        function renderEditorTodos() {
            const c = document.getElementById('todo-container');
            c.innerHTML = todos.map((t,i) => `<div class="todo-item"><input type="checkbox" onchange="todos[${i}].done=this.checked"> ${t.text}</div>`).join('');
        }
        const quotes = ["今天辛苦啦，你是最棒的 ✨", "慢慢来，没关系的 🌿", "生活明朗，万物可爱 🌊", "记得喝水，照顾好自己 🍵"];
        function drawLucky() { document.getElementById('lucky-card').innerText = quotes[Math.floor(Math.random()*quotes.length)]; }

        // --- 初始化 ---
        window.onload = () => {
            initCheckinGrid();
            renderNotes(notes);
            const savedTheme = localStorage.getItem('saved_theme');
            if(savedTheme) changeTheme(savedTheme);
        };
    </script>
</body>
</html>
